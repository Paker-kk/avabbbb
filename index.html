<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="Feng-Portfolio - AIGC 创意技术产研工程师作品集 | AIGC Creative Portfolio" />
    <meta name="theme-color" content="#f8f7f4" />
    <title>Feng-Portfolio</title>
    <!-- Google Fonts 国内镜像备选：用 fonts.loli.net 代替 fonts.googleapis.com 防止被墙 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
      /* 阿里巴巴普惠体 - 只保留 3 个关键字重（400/700/900），减少约 40% 字体下载 */
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-55-Regular/AlibabaPuHuiTi-3-55-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-85-Bold/AlibabaPuHuiTi-3-85-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('https://puhuiti.oss-cn-hangzhou.aliyuncs.com/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-115-Black/AlibabaPuHuiTi-3-115-Black.woff2') format('woff2');
        font-weight: 900;
        font-display: swap;
      }
    </style>
    <style>
      body {
        background-color: #f8f7f4;
        color: #0a0a0a;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      .dark body {
        background-color: #000000;
        color: #ffffff;
      }
      /* Custom Bullet Point Style */
      .bullet-point {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: currentColor;
        border-radius: 50%;
        margin-right: 12px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Modal Animations */
      .modal-enter {
        opacity: 0;
        transform: scale(0.95);
      }
      .modal-enter-active {
        opacity: 1;
        transform: scale(1);
        transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1), transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .modal-exit {
        opacity: 1;
        transform: scale(1);
      }
      .modal-exit-active {
        opacity: 0;
        transform: scale(0.95);
        transition: opacity 200ms cubic-bezier(0.16, 1, 0.3, 1), transform 200ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .backdrop-enter {
        opacity: 0;
        backdrop-filter: blur(0px);
      }
      .backdrop-enter-active {
        opacity: 1;
        backdrop-filter: blur(8px);
        transition: opacity 400ms ease, backdrop-filter 400ms ease;
      }
      .backdrop-exit {
        opacity: 1;
        backdrop-filter: blur(8px);
      }
      .backdrop-exit-active {
        opacity: 0;
        backdrop-filter: blur(0px);
        transition: opacity 300ms ease, backdrop-filter 300ms ease;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA 重定向接收器 -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
